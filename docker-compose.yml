services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ged_tutoring"]
      interval: 3s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: ged_tutoring
      # Home-LAN convenience: no password. Do not expose this Postgres port to the internet.
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - ged_pg_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres@db:5432/ged_tutoring?schema=public}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production-use-long-random-string}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  ged_pg_data:
